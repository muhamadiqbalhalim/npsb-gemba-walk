<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPSB Gemba Walk Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(
        135deg,
        #0f172a,
        #334155
    );
    min-height:100vh;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.header h1{
    color:#0f172a;
    margin-bottom:10px;
}

.header p{
    color:#64748b;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.card h3{
    margin-bottom:10px;
    color:#0f172a;
}

.menu-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    margin-bottom:15px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    color:white;
}

.scanner-btn{
    background:#10b981;
}

.leaderboard-btn{
    background:#f59e0b;
}

.profile-btn{
    background:#3b82f6;
}

.logout-btn{
    background:#ef4444;
}

.user-name{
    font-size:24px;
    font-weight:bold;
    color:#10b981;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">

        <h1>🏭 NPSB Gemba Walk</h1>

        <p>Welcome Back</p>

        <br>

        <div
            id="userName"
            class="user-name"
        >
            Loading...
        </div>

    </div>

    <div class="card">

        <h3>🚶 Start Gemba Walk</h3>

        <button
            class="menu-btn scanner-btn"
            onclick="location.href='scanner.html'"
        >
            Open Scanner
        </button>

    </div>

    <div class="card">

        <h3>🏆 Rankings</h3>

        <button
            class="menu-btn leaderboard-btn"
            onclick="location.href='leaderboard.html'"
        >
            Leaderboard
        </button>

    </div>

    <div class="card">

        <h3>👤 My Profile</h3>

        <button
            class="menu-btn profile-btn"
            onclick="location.href='profile.html'"
        >
            View Profile
        </button>

    </div>

    <div class="card">

        <button
            id="logoutBtn"
            class="menu-btn logout-btn"
        >
            Logout
        </button>

    </div>

</div>

<script type="module">

import {
    initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";

import {
    getAuth,
    signOut,
    onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

import {
    getFirestore,
    doc,
    getDoc
}
from
"https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDxhduIWiv5xkuySgWlntuYnCweS3aRM5M",
  authDomain: "npsbapp.firebaseapp.com",
  projectId: "npsbapp",
  storageBucket: "npsbapp.firebasestorage.app",
  messagingSenderId: "218858501285",
  appId: "1:218858501285:web:66781bee7880feb7d3094c",
  measurementId: "G-5V4T7X09E3"
};

const app =
initializeApp(
    firebaseConfig
);

const auth =
getAuth(app);

const db =
getFirestore(app);

const userName =
document.getElementById(
    "userName"
);

onAuthStateChanged(
    auth,
    async(user)=>{

        if(!user){

            window.location.href =
            "login.html";

            return;
        }

        const userDoc =
        await getDoc(
            doc(
                db,
                "users",
                user.uid
            )
        );

        if(
            userDoc.exists()
        ){

            const data =
            userDoc.data();

            userName.innerHTML =
            data.name ||
            user.email;

        }

    }
);

document
.getElementById(
    "logoutBtn"
)
.addEventListener(
    "click",
    async()=>{

        await signOut(
            auth
        );

        window.location.href =
        "login.html";

    }
);

</script>

</body>
</html>
