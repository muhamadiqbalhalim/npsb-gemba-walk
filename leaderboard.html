<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPSB Gemba Walk Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #2563eb;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 50%, #eef2ff 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-green: #10b981;
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --gold: #fbbf24;
            --silver: #cbd5e1;
            --bronze: #d97706;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Expanded container for better desktop view */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- NAVIGATION --- */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #ffffff;
            color: var(--text-main);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            background: #f8fafc;
        }

        /* --- HEADER SECTION --- */
        .header-card {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 24px;
            padding: 40px 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            text-align: center;
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.2);
            color: white;
        }

        .header-card::after {
            content: '\f091';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: -20px;
            top: -30px;
            font-size: 180px;
            opacity: 0.1;
            transform: rotate(15deg);
        }

        .header-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header-card p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* --- STATS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid white;
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            transition: transform 0.3s ease;
            box-shadow: var(--card-shadow);
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-box h2 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-green);
            margin-bottom: 5px;
        }

        .stat-box p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-box.highlight {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.05), rgba(79, 70, 229, 0.05));
            border: 1px solid rgba(37, 99, 235, 0.1);
        }
        
        .stat-box.highlight h2 {
            color: var(--primary);
        }

        /* --- LEADERBOARD LIST --- */
        .leaderboard-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: var(--card-shadow);
        }

        .leaderboard-title {
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-main);
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            margin-bottom: 15px;
            border-radius: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.5s ease backwards;
        }

        .user-row:hover {
            transform: scale(1.01) translateX(5px);
            background: #ffffff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
            border-color: #cbd5e1;
        }

        /* Dynamic Animation Delays */
        .user-row:nth-child(1) { animation-delay: 0.1s; }
        .user-row:nth-child(2) { animation-delay: 0.2s; }
        .user-row:nth-child(3) { animation-delay: 0.3s; }
        .user-row:nth-child(4) { animation-delay: 0.4s; }
        .user-row:nth-child(5) { animation-delay: 0.5s; }

        /* Sleek Top 3 Styling */
        .user-row.top1 { 
            border-left: 5px solid var(--gold); 
            background: linear-gradient(90deg, rgba(251, 191, 36, 0.1) 0%, #ffffff 100%);
            border-top: 1px solid rgba(251, 191, 36, 0.2);
            border-right: 1px solid rgba(251, 191, 36, 0.2);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
        }
        .user-row.top2 { 
            border-left: 5px solid #94a3b8; 
            background: linear-gradient(90deg, rgba(148, 163, 184, 0.1) 0%, #ffffff 100%);
        }
        .user-row.top3 { 
            border-left: 5px solid var(--bronze); 
            background: linear-gradient(90deg, rgba(217, 119, 6, 0.1) 0%, #ffffff 100%);
        }

        .left { display: flex; align-items: center; gap: 20px; }

        .rank {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: 700; font-size: 1.1rem; color: var(--text-main); letter-spacing: 0.5px; }
        .user-dept { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        /* Unified Points Badge */
        .points {
            font-weight: 800;
            color: #fff;
            background: var(--accent-green);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            letter-spacing: 0.5px;
            min-width: 90px;
            text-align: center;
        }

        .loading { text-align: center; padding: 40px; color: var(--text-muted); font-weight: 500; }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .pulse-text { animation: pulse 1.5s infinite; }

        /* Responsive */
        @media (max-width: 600px) {
            .user-row { flex-direction: column; gap: 15px; align-items: flex-start; }
            .points { align-self: flex-end; }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Back Navigation -->
    <a href="main_menu_pg.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Home
    </a>

    <!-- Main Header -->
    <div class="header-card">
        <h1>🏭 NPSB Gemba Walk</h1>
        <p>Live Leaderboard Rankings</p>
    </div>

    <!-- Personal & Company Stats Grid -->
    <div class="stats-grid">
        <div class="stat-box highlight">
            <h2 id="myRank">-</h2>
            <p>My Rank</p>
        </div>
        <div class="stat-box">
            <h2 id="myPoints">0</h2>
            <p>My Points</p>
        </div>
        <div class="stat-box">
            <h2 id="totalPoints">0</h2>
            <p>Company Total</p>
        </div>
    </div>

    <!-- Leaderboard List -->
    <div class="leaderboard-card">
        <div class="leaderboard-title">
            <span>🚀 Top Participants</span>
            <i class="fas fa-crown" style="color: var(--gold);"></i>
        </div>

        <div id="leaderboard-list">
            <div class="loading pulse-text">
                <i class="fas fa-circle-notch fa-spin" style="margin-right: 8px; font-size: 20px;"></i><br><br>
                Syncing live data...
            </div>
        </div>
    </div>

</div>

<!-- Firebase Script Logic -->
<script type="module">
    import { db, auth } from './firebaseConfig.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
    import { collection, query, orderBy, onSnapshot, getDoc, doc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    // Auth Check
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "login.html";
        }
    });

    const leaderboardList = document.getElementById("leaderboard-list");
    const totalPointsElement = document.getElementById("totalPoints");
    const myPointsElement = document.getElementById("myPoints");
    const myRankElement = document.getElementById("myRank");

    const q = query(collection(db, "gemba_points"), orderBy("totalPoints", "desc"));

    onSnapshot(q, async (snapshot) => {
        let html = '';
        let rank = 1;
        let myRank = null;
        let totalCompanyPoints = 0;

        for (const docSnap of snapshot.docs) {
            const pointsData = docSnap.data();

            // Filter out users with 0 or less points
            if ((pointsData.totalPoints || 0) <= 0) {
                continue;
            }

            // Check for current user's rank
            if (auth.currentUser && docSnap.id === auth.currentUser.uid) {
                myRank = rank;
            }

            // Fetch User Details
            const userDoc = await getDoc(doc(db, "users", docSnap.id));
            const user = userDoc.exists() ? userDoc.data() : {};

            totalCompanyPoints += pointsData.totalPoints || 0;

            // Medal Logic
            let medal = '';
            if (rank === 1) medal = '🥇';
            else if (rank === 2) medal = '🥈';
            else if (rank === 3) medal = '🥉';
            else medal = rank;

            // Row Class Logic
            let rowClass = "";
            if (rank === 1) rowClass = "top1";
            else if (rank === 2) rowClass = "top2";
            else if (rank === 3) rowClass = "top3";

            // Generate HTML Row
            html += `
            <div class="user-row ${rowClass}">
                <div class="left">
                    <div class="rank">${medal}</div>
                    <div class="user-info">
                        <div class="user-name">${user.name || docSnap.id}</div>
                        <div class="user-dept">${user.department || 'NPSB Team'}</div>
                    </div>
                </div>
                <div class="points">${pointsData.totalPoints || 0} pts</div>
            </div>
            `;
            
            rank++;
        }

        // Handle Empty State
        if (html === '') {
            leaderboardList.innerHTML = `
                <div class="loading">
                    <i class="fas fa-clipboard-list" style="font-size: 32px; margin-bottom: 15px; display:block; opacity: 0.5;"></i>
                    No participants yet. Be the first to score!
                </div>
            `;
            // Reset totals if no one has points
            totalPointsElement.textContent = '0';
            myPointsElement.textContent = '0';
            myRankElement.innerText = '-';
            return;
        }

        // Render Data
        leaderboardList.innerHTML = html;
        totalPointsElement.textContent = totalCompanyPoints.toLocaleString();

        // Update Current User Stats
        if (myRank) {
            myRankElement.innerText = "#" + myRank;
        } else {
            myRankElement.innerText = "-";
        }

        const currentUser = auth.currentUser;
        if (currentUser) {
            const myDoc = snapshot.docs.find(doc => doc.id === currentUser.uid);
            if (myDoc) {
                const myData = myDoc.data();
                myPointsElement.textContent = myData.totalPoints || 0;
            }
        }
    });
</script>

</body>
</html>
